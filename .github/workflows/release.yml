name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  # ─── Step 1: Compile TypeScript + Run Tests ─────────────────────────────
  compile:
    name: Compile TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Type-check runtime
        run: npx tsc -b runtime --noEmit

      - name: Run tests
        run: npm test

      - name: Build runtime
        run: npm run build

      - name: Create npm package
        run: npm pack

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: aahi-*.tgz

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: runtime-dist
          path: dist/

  # ─── Step 2: Build macOS (Apple Silicon) ────────────────────────────────
  build-macos-arm64:
    name: Build macOS (arm64)
    needs: compile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: runtime-dist
          path: dist/

      - name: Build Tauri (arm64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          args: --target aarch64-apple-darwin

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

  # ─── Step 3: Build macOS (Intel) ────────────────────────────────────────
  build-macos-x64:
    name: Build macOS (x64)
    needs: compile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: runtime-dist
          path: dist/

      - name: Build Tauri (x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          args: --target x86_64-apple-darwin

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

  # ─── Step 4: Build Windows (x64) ───────────────────────────────────────
  build-windows-x64:
    name: Build Windows (x64)
    needs: compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: runtime-dist
          path: dist/

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  # ─── Step 5: Build Linux (x64) ─────────────────────────────────────────
  build-linux-x64:
    name: Build Linux (x64)
    needs: compile
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: runtime-dist
          path: dist/

      - name: Build Tauri (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig

  # ─── Step 6: Build macOS Universal ─────────────────────────────────────
  build-macos-universal:
    name: Build macOS (universal)
    needs: [build-macos-arm64, build-macos-x64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: artifacts/arm64/

      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64
          path: artifacts/x64/

      - name: Create universal DMG
        run: |
          # Find DMGs
          ARM64_DMG=$(find artifacts/arm64 -name "*.dmg" | head -1)
          X64_DMG=$(find artifacts/x64 -name "*.dmg" | head -1)

          VERSION="${GITHUB_REF_NAME#v}"

          # Copy both DMGs as platform-specific releases
          cp "$ARM64_DMG" "Aahi_${VERSION}_aarch64.dmg" 2>/dev/null || true
          cp "$X64_DMG" "Aahi_${VERSION}_x64.dmg" 2>/dev/null || true

      - name: Upload universal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: "*.dmg"

  # ─── Step 7: Create GitHub Release ─────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [compile, build-macos-arm64, build-macos-x64, build-windows-x64, build-linux-x64, build-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release-files

          # npm package
          cp artifacts/npm-package/*.tgz release-files/ 2>/dev/null || true

          # macOS
          find artifacts/macos-arm64 -name "*.dmg" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/macos-arm64 -name "*.app.tar.gz" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/macos-x64 -name "*.dmg" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/macos-x64 -name "*.app.tar.gz" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/macos-universal -name "*.dmg" -exec cp {} release-files/ \; 2>/dev/null || true

          # Windows
          find artifacts/windows-x64 -name "*.msi" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/windows-x64 -name "*.exe" -exec cp {} release-files/ \; 2>/dev/null || true

          # Linux
          find artifacts/linux-x64 -name "*.deb" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/linux-x64 -name "*.rpm" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/linux-x64 -name "*.AppImage" -exec cp {} release-files/ \; 2>/dev/null || true

          # Source archives
          git archive --format=tar.gz --prefix=aahi-${GITHUB_REF_NAME#v}/ -o release-files/aahi-${GITHUB_REF_NAME#v}-source.tar.gz ${GITHUB_REF_NAME}
          git archive --format=zip --prefix=aahi-${GITHUB_REF_NAME#v}/ -o release-files/aahi-${GITHUB_REF_NAME#v}-source.zip ${GITHUB_REF_NAME}

          echo "Release files:"
          ls -lh release-files/

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > release-notes.md << NOTES
          ## Aahi v${VERSION} — AI-native Software Operations Platform

          **Not a VSCode fork.** Monaco + Tauri + LSP + Node.js Runtime + MCP.

          ### Downloads

          | Platform | File | Type |
          |----------|------|------|
          | **macOS (Apple Silicon)** | \`Aahi_${VERSION}_aarch64.dmg\` | DMG installer |
          | **macOS (Intel)** | \`Aahi_${VERSION}_x64.dmg\` | DMG installer |
          | **Windows** | \`Aahi_${VERSION}_x64-setup.exe\` | NSIS installer |
          | **Windows** | \`Aahi_${VERSION}_x64_en-US.msi\` | MSI installer |
          | **Linux** | \`aahi_${VERSION}_amd64.deb\` | Debian/Ubuntu |
          | **Linux** | \`aahi-${VERSION}-1.x86_64.rpm\` | Fedora/RHEL |
          | **Linux** | \`aahi_${VERSION}_amd64.AppImage\` | Universal AppImage |
          | **npm** | \`aahi-${VERSION}.tgz\` | npm package |
          | **Source** | \`aahi-${VERSION}-source.tar.gz\` | Source tarball |
          | **Source** | \`aahi-${VERSION}-source.zip\` | Source zip |

          ### Verify

          \`\`\`bash
          # macOS — bypass Gatekeeper for unsigned builds
          sudo xattr -rd com.apple.quarantine /Applications/Aahi.app

          # npm
          npm install aahi-${VERSION}.tgz

          # Linux
          sudo dpkg -i aahi_${VERSION}_amd64.deb     # Debian/Ubuntu
          sudo rpm -i aahi-${VERSION}-1.x86_64.rpm    # Fedora/RHEL
          chmod +x aahi_${VERSION}_amd64.AppImage      # AppImage
          \`\`\`
          NOTES

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} — Aahi Foundation Release"
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
