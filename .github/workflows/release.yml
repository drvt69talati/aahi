name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  # ─── Step 1: Compile TypeScript + Run Tests ─────────────────────────────
  compile:
    name: Compile TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Type-check runtime
        run: npx tsc -b runtime --noEmit

      - name: Run tests
        run: npm test

      - name: Build runtime
        run: npm run build

      - name: Create npm package
        run: npm pack

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: aahi-*.tgz

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: runtime-dist
          path: dist/

  # ─── Step 2: Build macOS (Apple Silicon) ────────────────────────────────
  build-macos-arm64:
    name: Build macOS (arm64)
    needs: compile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: runtime-dist
          path: dist/

      - name: Build Tauri (arm64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-apple-darwin

      - name: Ad-hoc code sign the app
        run: |
          APP_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing $APP_PATH"
            codesign --force --deep --sign - "$APP_PATH"
            codesign --verify --deep "$APP_PATH" && echo "Signature valid" || echo "Signature check failed"
          fi

      - name: Re-create DMG with signed app
        run: |
          APP_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            APP_NAME=$(basename "$APP_PATH")
            DMG_NAME="Aahi_${VERSION}_aarch64.dmg"

            # Create a temporary DMG with the signed app
            mkdir -p /tmp/dmg-contents
            cp -R "$APP_PATH" /tmp/dmg-contents/
            ln -s /Applications /tmp/dmg-contents/Applications

            hdiutil create -volname "Aahi" -srcfolder /tmp/dmg-contents \
              -ov -format UDZO \
              "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/${DMG_NAME}"

            rm -rf /tmp/dmg-contents
            echo "Created signed DMG: ${DMG_NAME}"
          fi

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz

  # ─── Step 3: Build macOS (Intel) ────────────────────────────────────────
  build-macos-x64:
    name: Build macOS (x64)
    needs: compile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: runtime-dist
          path: dist/

      - name: Build Tauri (x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-apple-darwin

      - name: Ad-hoc code sign the app
        run: |
          APP_PATH=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing $APP_PATH"
            codesign --force --deep --sign - "$APP_PATH"
            codesign --verify --deep "$APP_PATH" && echo "Signature valid" || echo "Signature check failed"
          fi

      - name: Re-create DMG with signed app
        run: |
          APP_PATH=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            DMG_NAME="Aahi_${VERSION}_x64.dmg"

            mkdir -p /tmp/dmg-contents
            cp -R "$APP_PATH" /tmp/dmg-contents/
            ln -s /Applications /tmp/dmg-contents/Applications

            hdiutil create -volname "Aahi" -srcfolder /tmp/dmg-contents \
              -ov -format UDZO \
              "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/${DMG_NAME}"

            rm -rf /tmp/dmg-contents
            echo "Created signed DMG: ${DMG_NAME}"
          fi

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz

  # ─── Step 4: Build Windows (x64) ───────────────────────────────────────
  build-windows-x64:
    name: Build Windows (x64)
    needs: compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: runtime-dist
          path: dist/

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  # ─── Step 5: Build Linux (x64) ─────────────────────────────────────────
  build-linux-x64:
    name: Build Linux (x64)
    needs: compile
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: runtime-dist
          path: dist/

      - name: Build Tauri (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz

  # ─── Step 6: Create GitHub Release ─────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [compile, build-macos-arm64, build-macos-x64, build-windows-x64, build-linux-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release-files

          # npm package
          cp artifacts/npm-package/*.tgz release-files/ 2>/dev/null || true

          # macOS
          find artifacts/macos-arm64 -name "*.dmg" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/macos-x64 -name "*.dmg" -exec cp {} release-files/ \; 2>/dev/null || true

          # Windows
          find artifacts/windows-x64 -name "*.msi" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/windows-x64 -name "*.exe" -exec cp {} release-files/ \; 2>/dev/null || true

          # Linux
          find artifacts/linux-x64 -name "*.deb" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/linux-x64 -name "*.rpm" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/linux-x64 -name "*.AppImage" -exec cp {} release-files/ \; 2>/dev/null || true

          # Source archives
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix=aahi-${VERSION}/ -o release-files/aahi-${VERSION}-source.tar.gz ${GITHUB_REF_NAME}
          git archive --format=zip --prefix=aahi-${VERSION}/ -o release-files/aahi-${VERSION}-source.zip ${GITHUB_REF_NAME}

          echo "Release files:"
          ls -lh release-files/

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > release-notes.md << NOTES
          ## Aahi v${VERSION} — AI-native Software Operations Platform

          **Not a VSCode fork.** Monaco + Tauri + LSP + Node.js Runtime + MCP.

          ### Downloads

          | Platform | File | Type |
          |----------|------|------|
          | **macOS (Apple Silicon)** | \`Aahi_${VERSION}_aarch64.dmg\` | DMG installer |
          | **macOS (Intel)** | \`Aahi_${VERSION}_x64.dmg\` | DMG installer |
          | **Windows** | \`Aahi_${VERSION}_x64-setup.exe\` | NSIS installer |
          | **Windows** | \`Aahi_${VERSION}_x64_en-US.msi\` | MSI installer |
          | **Linux** | \`aahi_${VERSION}_amd64.deb\` | Debian/Ubuntu |
          | **Linux** | \`aahi-${VERSION}-1.x86_64.rpm\` | Fedora/RHEL |
          | **Linux** | \`aahi_${VERSION}_amd64.AppImage\` | Universal AppImage |
          | **npm** | \`aahi-${VERSION}.tgz\` | npm package |

          ### macOS First Launch

          The app is ad-hoc signed (not Apple notarized). On first launch:
          1. Right-click the app → **Open**
          2. Click **Open** in the dialog
          3. Or run: \`sudo xattr -rd com.apple.quarantine /Applications/Aahi.app\`

          NOTES

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} — Aahi"
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
